<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chalkboard Hangman - Country Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --chalk: #f5f5f5; --board: #1e3a2f; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #162a22;
        }

        body {
            background-image: url('https://www.transparenttextures.com/patterns/chalkboard.png');
            color: var(--chalk);
            font-family: 'Verdana', sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: flex-start;
            padding: env(safe-area-inset-top) 10px;
            touch-action: none; /* Prevents pull-to-refresh and jumping */
        }

        #game-container { 
            width: 100%; 
            max-width: 500px; 
            height: 95vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 20px;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            width: 100%; 
            padding: 10px 0;
            border-bottom: 2px solid rgba(255,255,255,0.2); 
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        
        canvas { 
            filter: blur(0.3px) drop-shadow(0px 0px 1px white); 
            border: 4px solid #5d4037; 
            background: var(--board);
            border-radius: 4px; 
            height: 200px; 
            width: 180px;
            margin: 10px 0;
            flex-shrink: 0;
        }

        .word-display { 
            font-size: 1.6rem; 
            letter-spacing: 5px; 
            margin: 10px 0; 
            min-height: 2.2rem; 
            text-transform: uppercase; 
            font-weight: bold;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .keyboard { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 6px; 
            width: 100%; 
            padding: 5px;
            flex-shrink: 0;
        }

        .key { 
            background: rgba(255,255,255,0.1); 
            border: 1.5px solid var(--chalk); 
            color: var(--chalk); 
            aspect-ratio: 1 / 1;
            font-size: 1.1rem; 
            cursor: pointer; 
            border-radius: 6px; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .key:active { transform: scale(0.9); }
        .key:disabled { opacity: 0.2; transform: none; }
        .key.correct { background: #27ae60; border-color: #27ae60; }
        .key.wrong { background: #c0392b; border-color: #c0392b; }

        #menu-screen, #ui-overlay { 
            position: fixed; inset: 0; 
            background: var(--board); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            padding: 20px; text-align: center;
        }

        #ui-overlay { background: rgba(15, 30, 24, 0.98); display: none; }
        
        .lvl-btn { 
            width: 260px; padding: 15px; margin: 10px; 
            background: transparent; border: 2px solid white; color: white; 
            font-size: 1.2rem; cursor: pointer; border-radius: 12px;
        }

        .audio-icon-btn { background: #f39c12; border: none; border-radius: 50%; width: 60px; height: 60px; cursor: pointer; color: white; font-size: 24px; margin: 15px 0; }
        .btn-next { background: #fff; color: #000; border: none; padding: 15px 40px; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.1rem; }

        @media (max-height: 600px) {
            canvas { height: 150px; width: 140px; }
            .word-display { font-size: 1.3rem; }
            .key { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1 style="font-size: 2.5rem; margin: 0; color: #f1c40f;">Hangman</h1>
        <h3 style="margin: 10px 0;">Country Edition / גרסת המדינות</h3>
        
        <div style="margin: 20px 0; color: #bdc3c7; font-size: 0.95rem;">
            <p>Guess the country name!<br>נחשו את שם המדינה!</p>
        </div>

        <button class="lvl-btn" onclick="startLevel(1)">Level 1 / שלב 1</button>
        <button class="lvl-btn" onclick="startLevel(2)">Level 2 / שלב 2</button>
        <button class="lvl-btn" onclick="startLevel(3)">Level 3 / שלב 3</button>
        <button class="lvl-btn" onclick="startLevel(4)">Level 4 / שלב 4</button>
    </div>

    <div id="game-container" style="display:none;">
        <div class="header">
            <button onclick="location.reload()" style="background:none; border:none; color:white; font-size:0.9rem;">⬅ Menu / תפריט</button>
            <div>Country / מדינה: <span id="round-num">1</span>/8</div>
            <div>Score / ניקוד: <span id="score">0</span></div>
        </div>
        
        <canvas id="hangman" width="200" height="240"></canvas>
        
        <div class="word-display" id="word-slots"></div>
        
        <div id="keyboard" class="keyboard"></div>
    </div>

    <div id="ui-overlay">
        <div id="result-content" style="text-align:center; width: 100%;">
            <div id="round-result">
                <h2 id="res-title"></h2>
                <h1 id="res-word" style="color: #f1c40f; text-transform: uppercase; margin: 10px 0; letter-spacing: 2px;"></h1>
                <h2 id="res-trans" style="color: #ecf0f1; margin: 5px 0;"></h2>
                <button class="audio-icon-btn" onclick="playWordAudio()">🔊</button><br>
                <button class="btn-next" onclick="nextRound()">Next / הבא</button>
            </div>
        </div>
    </div>

    <script>
        const allLevels = {
            1: [{e:"Argentina", h:"ארגנטינה"}, {e:"Australia", h:"אוסטרליה"}, {e:"Brazil", h:"ברזיל"}, {e:"Canada", h:"קנדה"}, {e:"Colombia", h:"קולומביה"}, {e:"Mexico", h:"מקסיקו"}, {e:"Panama", h:"פנמה"}, {e:"America", h:"ארה״ב"}],
            2: [{e:"Italy", h:"איטליה"}, {e:"Belgium", h:"בלגיה"}, {e:"Japan", h:"יפן"}, {e:"Russia", h:"רוסיה"}, {e:"Ukraine", h:"אוקראינה"}, {e:"Ethiopia", h:"אתיופיה"}, {e:"England", h:"אנגליה"}, {e:"Germany", h:"גרמניה"}],
            3: [{e:"South Africa", h:"דרום אפריקה"}, {e:"Hungary", h:"הונגריה"}, {e:"Poland", h:"פולין"}, {e:"Norway", h:"נורווגיה"}, {e:"Thailand", h:"תאילנד"}, {e:"Sweden", h:"שבדיה"}, {e:"China", h:"סין"}, {e:"Ireland", h:"אירלנד"}],
            4: [{e:"Egypt", h:"מצרים"}, {e:"Greece", h:"יוון"}, {e:"Cyprus", h:"קפריסין"}, {e:"France", h:"צרפת"}, {e:"India", h:"הודו"}, {e:"Switzerland", h:"שוויץ"}, {e:"Netherlands", h:"הולנד"}, {e:"Lithuania", h:"ליטא"}]
        };

        let currentWords = [], currentRound = 0, score = 0, mistakes = 0, guessedLetters = [], currentWord = "", canPlay = true;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function startLevel(num) {
            currentWords = [...allLevels[num]].sort(() => Math.random() - 0.5);
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            initGame();
        }

        function initGame() {
            currentWord = currentWords[currentRound].e.toLowerCase();
            guessedLetters = []; mistakes = 0; canPlay = true;
            document.getElementById('round-num').innerText = currentRound + 1;
            document.getElementById('ui-overlay').style.display = 'none';
            drawGallows(); renderWord(); renderKeyboard();
        }

        function renderWord() {
            const display = currentWord.split('').map(letter => {
                if (letter === " ") return "&nbsp;&nbsp;";
                return guessedLetters.includes(letter) ? letter : "_";
            }).join(' ');
            document.getElementById('word-slots').innerHTML = display;
        }

        function renderKeyboard() {
            const kb = document.getElementById('keyboard'); kb.innerHTML = '';
            "abcdefghijklmnopqrstuvwxyz".split('').forEach(l => {
                const btn = document.createElement('button');
                btn.className = 'key'; btn.innerText = l;
                btn.onclick = () => {
                    if (!canPlay || btn.disabled) return;
                    speak(l); btn.disabled = true;
                    if (currentWord.includes(l)) {
                        btn.classList.add('correct'); 
                        guessedLetters.push(l); 
                        renderWord();
                        if (currentWord.replace(/\s/g, '').split('').every(char => guessedLetters.includes(char))) {
                            score++; 
                            document.getElementById('score').innerText = score; 
                            showResult("Well Done!", "!כל הכבוד");
                        }
                    } else {
                        btn.classList.add('wrong'); 
                        mistakes++; 
                        drawMan();
                        if (mistakes >= 13) showResult("The answer was:", ":התשובה הייתה");
                    }
                };
                kb.appendChild(btn);
            });
        }

        function showResult(enTitle, heTitle) {
            canPlay = false;
            document.getElementById('ui-overlay').style.display = 'flex';
            document.getElementById('res-title').innerText = `${enTitle} ${heTitle}`;
            document.getElementById('res-word').innerText = currentWords[currentRound].e;
            document.getElementById('res-trans').innerText = currentWords[currentRound].h;
            setTimeout(() => speak(currentWords[currentRound].e), 300);
        }

        function playWordAudio() { speak(currentWords[currentRound].e); }

        function nextRound() {
            currentRound++;
            if (currentRound < 8) {
                initGame();
            } else {
                document.getElementById('ui-overlay').innerHTML = `
                    <div style="color:white;">
                        <h2 style="font-size:2rem;">Game Finished! / המשחק נגמר!</h2>
                        <h1 style="font-size:5rem; margin: 20px 0; color: #f1c40f;">${score}/8</h1>
                        <button class="btn-next" onclick="location.reload()">Back to Menu / חזרה לתפריט</button>
                    </div>`;
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        }

        const canvas = document.getElementById('hangman');
        const ctx = canvas.getContext('2d');
        function drawGallows() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(255,255,255,0.8)"; ctx.lineWidth = 4;
            ctx.beginPath(); 
            ctx.moveTo(20, 220); ctx.lineTo(100, 220); // Base
            ctx.moveTo(40, 220); ctx.lineTo(40, 20);  // Post
            ctx.moveTo(40, 20); ctx.lineTo(140, 20);  // Top
            ctx.moveTo(140, 20); ctx.lineTo(140, 50); // Rope
            ctx.stroke();
        }

        function drawMan() {
            ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.beginPath();
            switch(mistakes) {
                case 1: ctx.arc(140, 70, 20, 0, Math.PI * 2); break; // Head
                case 2: ctx.moveTo(140, 90); ctx.lineTo(140, 160); break; // Body
                case 3: ctx.moveTo(140, 110); ctx.lineTo(110, 140); break; // L Arm
                case 4: ctx.moveTo(140, 110); ctx.lineTo(170, 140); break; // R Arm
                case 5: ctx.moveTo(140, 160); ctx.lineTo(115, 210); break; // L Leg
                case 6: ctx.moveTo(140, 160); ctx.lineTo(165, 210); break; // R Leg
                case 7: ctx.moveTo(133, 65); ctx.lineTo(135, 65); break; // Eye L
                case 8: ctx.moveTo(145, 65); ctx.lineTo(147, 65); break; // Eye R
                case 9: ctx.moveTo(140, 72); ctx.lineTo(140, 78); break; // Nose
                case 10: ctx.arc(140, 82, 5, 0, Math.PI); break; // Mouth
                case 11: ctx.beginPath(); ctx.arc(118, 70, 4, 0, Math.PI * 2); ctx.stroke(); break; // Ear L
                case 12: ctx.beginPath(); ctx.arc(162, 70, 4, 0, Math.PI * 2); ctx.stroke(); break; // Ear R
                case 13: // Dead eyes (X)
                    ctx.moveTo(132, 62); ctx.lineTo(138, 68); ctx.moveTo(138, 62); ctx.lineTo(132, 68);
                    ctx.moveTo(142, 62); ctx.lineTo(148, 68); ctx.moveTo(148, 62); ctx.lineTo(142, 68);
                    break; 
            }
            ctx.stroke();
        }
    </script>
</body>
</html>
