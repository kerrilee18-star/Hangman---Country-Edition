<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Country Hangman</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Andika&display=swap" rel="stylesheet">
    <style>
        :root { --chalk: #f5f5f5; --board: #1e3a2f; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            overflow: hidden; background-color: #162a22;
            position: fixed; /* Prevents bounce and scroll */
        }

        body {
            background-image: url('https://www.transparenttextures.com/patterns/chalkboard.png');
            color: var(--chalk);
            font-family: 'Andika', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        #game-container { 
            width: 100%; max-width: 500px; height: 100dvh;
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; padding: 10px;
        }

        .header { 
            display: flex; justify-content: space-between; width: 100%; 
            height: 5vh; align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.2); 
            font-size: 0.9rem; flex-shrink: 0;
        }
        
        #canvas-wrap {
            height: 30vh; width: 100%; display: flex; justify-content: center; align-items: center;
        }

        canvas { 
            background: var(--board); border: 4px solid #5d4037; border-radius: 8px; 
            height: 100%; width: auto; aspect-ratio: 5/6;
        }

        .word-display { 
            height: 12vh; width: 100%;
            font-size: clamp(1.4rem, 6vw, 2.2rem); letter-spacing: 4px; 
            text-transform: uppercase; font-weight: bold; 
            display: flex; justify-content: center; align-items: center; flex-wrap: wrap;
        }

        .keyboard { 
            height: 45vh; display: grid; grid-template-columns: repeat(7, 1fr); 
            gap: 5px; width: 100%; padding-bottom: env(safe-area-inset-bottom);
        }

        .key { 
            background: rgba(255,255,255,0.1); border: 1.5px solid var(--chalk); 
            color: var(--chalk); width: 100%; height: 100%; font-size: 1.2rem; 
            cursor: pointer; border-radius: 8px; text-transform: uppercase;
            font-family: 'Andika', sans-serif; display: flex; align-items: center; justify-content: center;
        }

        .key:disabled { opacity: 0.15; }
        .key.correct { background: #27ae60 !important; border-color: #27ae60; opacity: 1 !important; }
        .key.wrong { background: #c0392b !important; border-color: #c0392b; opacity: 1 !important; }

        #menu-screen, #ui-overlay { 
            position: fixed; inset: 0; background: var(--board); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
            flex-direction: column; padding: 20px; text-align: center;
        }

        #ui-overlay { background: rgba(15, 30, 24, 0.98); display: none; }
        .lvl-btn { width: 260px; padding: 15px; margin: 8px; background: transparent; border: 2.5px solid white; color: white; font-size: 1.3rem; border-radius: 15px; font-family: 'Andika', sans-serif; }
        .audio-icon-btn { background: #f39c12; border: none; border-radius: 50%; width: 60px; height: 60px; color: white; font-size: 24px; margin: 15px 0; }
        .btn-next { background: #fff; color: #000; border: none; padding: 15px 40px; font-weight: bold; border-radius: 10px; font-size: 1.2rem; font-family: 'Andika', sans-serif; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1 style="font-size: 3rem; margin: 0; color: #f1c40f; text-transform: uppercase;">HANGMAN</h1>
        <h3 style="margin: 5px 0; text-transform: uppercase;">COUNTRY EDITION / גרסת המדינות</h3>
        <button class="lvl-btn" onclick="startLevel(1)">LEVEL 1 / שלב 1</button>
        <button class="lvl-btn" onclick="startLevel(2)">LEVEL 2 / שלב 2</button>
        <button class="lvl-btn" onclick="startLevel(3)">LEVEL 3 / שלב 3</button>
        <button class="lvl-btn" onclick="startLevel(4)">LEVEL 4 / שלב 4</button>
    </div>

    <div id="game-container" style="display:none;">
        <div class="header">
            <button onclick="location.reload()" style="background:none; border:none; color:white; font-family: 'Andika'; font-size: 1rem;">⬅ MENU</button>
            <div>ROUND: <span id="round-num">1</span>/8</div>
            <div>SCORE: <span id="score">0</span></div>
        </div>
        <div id="canvas-wrap">
            <canvas id="hangman" width="200" height="240"></canvas>
        </div>
        <div class="word-display" id="word-slots"></div>
        <div id="keyboard" class="keyboard"></div>
    </div>

    <div id="ui-overlay">
        <div id="result-content" style="text-align:center; width: 100%;">
            <h2 id="res-title" style="text-transform: uppercase;"></h2>
            <h1 id="res-word" style="color: #f1c40f; text-transform: uppercase; font-size: 3rem; margin: 10px 0;"></h1>
            <h2 id="res-trans" style="color: #ecf0f1; margin: 5px 0;"></h2>
            <button class="audio-icon-btn" onclick="playWordAudio()">🔊</button><br>
            <button class="btn-next" onclick="nextRound()">NEXT / הבא</button>
        </div>
    </div>

    <script>
        const allLevels = {
            1: [{e:"ARGENTINA", h:"ארגנטינה"}, {e:"AUSTRALIA", h:"אוסטרליה"}, {e:"BRAZIL", h:"ברזיל"}, {e:"CANADA", h:"קנדה"}, {e:"COLOMBIA", h:"קולומביה"}, {e:"MEXICO", h:"מקסיקו"}, {e:"PANAMA", h:"פנמה"}, {e:"AMERICA", h:"ארה״ב"}],
            2: [{e:"ITALY", h:"איטליה"}, {e:"BELGIUM", h:"בלגיה"}, {e:"JAPAN", h:"יפן"}, {e:"RUSSIA", h:"רוסיה"}, {e:"UKRAINE", h:"אוקראינה"}, {e:"ETHIOPIA", h:"אתיופיה"}, {e:"ENGLAND", h:"אנגליה"}, {e:"GERMANY", h:"גרמניה"}],
            3: [{e:"SOUTH AFRICA", h:"דרום אפריקה"}, {e:"HUNGARY", h:"הונגריה"}, {e:"POLAND", h:"פולין"}, {e:"NORWAY", h:"נורווגיה"}, {e:"THAILAND", h:"תאילנד"}, {e:"SWEDEN", h:"שבדיה"}, {e:"CHINA", h:"סין"}, {e:"IRELAND", h:"אירלנד"}],
            4: [{e:"EGYPT", h:"מצרים"}, {e:"GREECE", h:"יוון"}, {e:"CYPRUS", h:"קפריסין"}, {e:"FRANCE", h:"צרפת"}, {e:"INDIA", h:"הודו"}, {e:"SWITZERLAND", h:"שוויץ"}, {e:"NETHERLANDS", h:"הולנד"}, {e:"LITHUANIA", h:"ליטא"}]
        };

        let currentWords = [], currentRound = 0, score = 0, mistakes = 0, guessedLetters = [], currentWord = "", canPlay = true;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function startLevel(num) {
            currentWords = [...allLevels[num]].sort(() => Math.random() - 0.5);
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            initGame();
        }

        function initGame() {
            currentWord = currentWords[currentRound].e.toUpperCase();
            guessedLetters = []; mistakes = 0; canPlay = true;
            document.getElementById('round-num').innerText = currentRound + 1;
            document.getElementById('ui-overlay').style.display = 'none';
            drawGallows(); renderWord(); renderKeyboard();
        }

        function renderWord() {
            const display = currentWord.split('').map(letter => {
                if (letter === " ") return "&nbsp;&nbsp;";
                return guessedLetters.includes(letter) ? letter : "_";
            }).join(' ');
            document.getElementById('word-slots').innerHTML = display;
        }

        function renderKeyboard() {
            const kb = document.getElementById('keyboard'); kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
                const btn = document.createElement('button');
                btn.className = 'key'; btn.innerText = l;
                btn.onclick = () => {
                    if (!canPlay || btn.disabled) return;
                    speak(l); btn.disabled = true;
                    if (currentWord.includes(l)) {
                        btn.classList.add('correct'); guessedLetters.push(l); renderWord();
                        if (currentWord.replace(/\s/g, '').split('').every(char => guessedLetters.includes(char))) {
                            score++; document.getElementById('score').innerText = score; showResult("WELL DONE!", "!כל הכבוד");
                        }
                    } else {
                        btn.classList.add('wrong'); mistakes++; drawMan();
                        if (mistakes >= 13) showResult("THE ANSWER WAS:", ":התשובה הייתה");
                    }
                };
                kb.appendChild(btn);
            });
        }

        function showResult(en, he) {
            canPlay = false;
            document.getElementById('ui-overlay').style.display = 'flex';
            document.getElementById('res-title').innerText = `${en} ${he}`;
            document.getElementById('res-word').innerText = currentWords[currentRound].e;
            document.getElementById('res-trans').innerText = currentWords[currentRound].h;
            setTimeout(() => speak(currentWords[currentRound].e), 300);
        }

        function playWordAudio() { speak(currentWords[currentRound].e); }

        function nextRound() {
            currentRound++;
            if (currentRound < 8) {
                initGame();
            } else {
                document.getElementById('ui-overlay').innerHTML = `
                    <div style="color:white;">
                        <h2 style="text-transform:uppercase;">GAME FINISHED! / המשחק נגמר!</h2>
                        <h1 style="font-size:5rem; margin: 20px 0; color: #f1c40f;">${score}/8</h1>
                        <button class="btn-next" onclick="location.reload()">BACK TO MENU</button>
                    </div>`;
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        }

        const canvas = document.getElementById('hangman');
        const ctx = canvas.getContext('2d');
        function drawGallows() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(255,255,255,0.8)"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(20, 220); ctx.lineTo(100, 220); ctx.moveTo(40, 220); ctx.lineTo(40, 20); ctx.moveTo(40, 20); ctx.lineTo(140, 20); ctx.moveTo(140, 20); ctx.lineTo(140, 50); ctx.stroke();
        }

        function drawMan() {
            ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.beginPath();
            switch(mistakes) {
                case 1: ctx.arc(140, 70, 20, 0, Math.PI * 2); break;
                case 2: ctx.moveTo(140, 90); ctx.lineTo(140, 160); break;
                case 3: ctx.moveTo(140, 110); ctx.lineTo(110, 140); break;
                case 4: ctx.moveTo(140, 110); ctx.lineTo(170, 140); break;
                case 5: ctx.moveTo(140, 160); ctx.lineTo(115, 210); break;
                case 6: ctx.moveTo(140, 160); ctx.lineTo(165, 210); break;
                case 7: ctx.moveTo(133, 65); ctx.lineTo(135, 65); break;
                case 8: ctx.moveTo(145, 65); ctx.lineTo(147, 65); break;
                case 9: ctx.moveTo(140, 72); ctx.lineTo(140, 78); break;
                case 10: ctx.arc(140, 82, 5, 0, Math.PI); break;
                case 11: ctx.beginPath(); ctx.arc(118, 70, 4, 0, Math.PI * 2); ctx.stroke(); break;
                case 12: ctx.beginPath(); ctx.arc(162, 70, 4, 0, Math.PI * 2); ctx.stroke(); break;
                case 13: 
                    ctx.moveTo(132, 62); ctx.lineTo(138, 68); ctx.moveTo(138, 62); ctx.lineTo(132, 68);
                    ctx.moveTo(142, 62); ctx.lineTo(148, 68); ctx.moveTo(148, 62); ctx.lineTo(142, 68);
                    break; 
            }
            ctx.stroke();
        }
    </script>
</body>
</html>
